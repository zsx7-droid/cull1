services:
  - type: web
    name: she-culture-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        sync: false
      - key: ALI_ACCESS_KEY_ID
        sync: false
      - key: ALI_ACCESS_KEY_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
